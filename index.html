                                                </div>
                                            )}

                                            {/* Horario */}
                                            {serviceStart && serviceEnd && (
                                                <div style={{
                                                    display: "flex",
                                                    justifyContent: "space-between",
                                                    marginBottom: "0.5rem"
                                                }}>
                                                    <span style={{ fontWeight: 600 }}>
                                                        Horario:
                                                    </span>
                                                    <span>{serviceStart} - {serviceEnd}</span>
                                                </div>
                                            )}
                                        </div>

                                        {/* Totales */}
                                        <div style={{
                                            borderTop: `2px solid ${COLORS.border}`,
                                            paddingTop: "1rem"
                                        }}>
                                            <div style={{
                                                display: "flex",
                                                justifyContent: "space-between",
                                                marginBottom: "0.5rem",
                                                fontSize: "1rem"
                                            }}>
                                                <span style={{ fontWeight: 600 }}>
                                                    Subtotal:
                                                </span>
                                                <span style={{ fontWeight: 700 }}>
                                                    {formatMXN(subtotal)}
                                                </span>
                                            </div>

                                            <div style={{
                                                display: "flex",
                                                justifyContent: "space-between",
                                                marginBottom: "1rem",
                                                fontSize: "1.25rem"
                                            }}>
                                                <span style={{ fontWeight: 700 }}>
                                                    TOTAL:
                                                </span>
                                                <span style={{ 
                                                    fontWeight: 900,
                                                    color: COLORS.primary
                                                }}>
                                                    {formatMXN(total)}
                                                </span>
                                            </div>

                                            {adultsNum > 0 && (
                                                <div style={{
                                                    display: "flex",
                                                    justifyContent: "space-between",
                                                    padding: "0.75rem",
                                                    borderRadius: "var(--tdm-radius-md)",
                                                    background: COLORS.background
                                                }}>
                                                    <span style={{ fontWeight: 600 }}>
                                                        Por persona:
                                                    </span>
                                                    <span style={{ fontWeight: 700 }}>
                                                        {formatMXN(pricePerPerson)}
                                                    </span>
                                                </div>
                                            )}
                                        </div>

                                        {/* Botón exportar */}
                                        <Button
                                            onClick={handleExportPdf}
                                            disabled={!canExportPdf}
                                            variant="success"
                                            fullWidth
                                        >
                                            📄 Exportar PDF
                                        </Button>

                                        {!canExportPdf && missingFields.length > 0 && (
                                            <div style={{
                                                fontSize: "0.75rem",
                                                color: COLORS.muted,
                                                fontStyle: "italic"
                                            }}>
                                                Faltan {missingFields.length} campo(s) requerido(s)
                                            </div>
                                        )}
                                    </div>
                                </Section>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // =========================
        // RENDER
        // =========================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
