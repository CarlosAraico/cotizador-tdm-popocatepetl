<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotiza con nosotros en Tacos Don Manolito Popocatepetl</title>
    
    <!-- React 18 UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- jsPDF + AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* =========================
           DESIGN TOKENS (TDM 2026)
           ========================= */
        :root {
            --tdm-primary: #864119;
            --tdm-secondary: #9D5F32;
            --tdm-accent: #DDB257;
            --tdm-accent2: #D49D43;
            --tdm-background: #F1F0EE;
            --tdm-surface: #FFFFFF;
            --tdm-text: #151515;
            --tdm-muted: #6B6B6B;
            --tdm-border: #E6E0D8;
            --tdm-success: #4CAF50;
            --tdm-warning: #FF9800;
            --tdm-error: #F44336;
            --tdm-radius-sm: 8px;
            --tdm-radius-md: 12px;
            --tdm-radius-lg: 16px;
            --tdm-shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --tdm-shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --tdm-shadow-lg: 0 8px 24px rgba(0,0,0,0.16);
        }

        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--tdm-background);
            color: var(--tdm-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Typography Scale */
        .text-xs { font-size: 0.75rem; }
        .text-sm { font-size: 0.875rem; }
        .text-base { font-size: 1rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        
        .font-normal { font-weight: 400; }
        .font-medium { font-weight: 500; }
        .font-semibold { font-weight: 600; }
        .font-bold { font-weight: 700; }
        .font-black { font-weight: 900; }

        /* Utility Classes */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        @media (min-width: 768px) {
            .container { padding: 1.5rem; }
        }

        /* Focus visible for accessibility */
        *:focus-visible {
            outline: 2px solid var(--tdm-accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const { jsPDF } = window.jspdf;

        // =========================
        // CONFIGURACIÓN Y CONSTANTES
        // =========================
        
        const CONFIG = {
            pageTitle: "Cotiza con nosotros en Tacos Don Manolito Popocatepetl",
            branchName: "TDM Popocatepetl",
            logoUrl: "https://i.ibb.co/FRzgZFw/Logo-TDM-On-Black.png",
            contact: {
                phone: "5645960445",
                email: "popocatepetl@tacosdonmanolito.com",
                address: "Av. Popocatépetl 415, Col. Sta Cruz Atoyac, Benito Juárez, 03310 Ciudad de México, CDMX"
            },
            pdfTerms: "Precios más IVA en caso de requerir factura. Anticipo del 50% para confirmar. Válida por 7 días.",
            language: "es-MX"
        };

        const COLORS = {
            primary: "#864119",
            secondary: "#9D5F32",
            accent: "#DDB257",
            accent2: "#D49D43",
            background: "#F1F0EE",
            surface: "#FFFFFF",
            text: "#151515",
            muted: "#6B6B6B",
            border: "#E6E0D8",
            success: "#4CAF50",
            warning: "#FF9800",
            error: "#F44336"
        };

        // Mock data - En producción vendría de API/DB
        const DATA_CLIENTS = [
            { 
                cliente: "Cliente Ejemplo 1", 
                telefono: "5512345678", 
                correo: "cliente1@example.com", 
                direccion: "Calle Falsa 123, Col. Centro, CDMX"
            },
            { 
                cliente: "Cliente Ejemplo 2", 
                telefono: "5587654321", 
                correo: "cliente2@example.com", 
                direccion: "Av. Principal 456, Col. Juárez, CDMX"
            }
        ];

        const DATA_PRODUCTS = [
            { tipoEvento: "Catering", grupo: "Tacos", platillo: "Taco de Pastor", precioVenta: 25 },
            { tipoEvento: "Catering", grupo: "Tacos", platillo: "Taco de Suadero", precioVenta: 25 },
            { tipoEvento: "Catering", grupo: "Tacos", platillo: "Taco de Bistec", precioVenta: 28 },
            { tipoEvento: "Catering", grupo: "Tacos", platillo: "Taco de Chorizo", precioVenta: 23 },
            { tipoEvento: "Evento", grupo: "Entradas", platillo: "Guacamole", precioVenta: 150 },
            { tipoEvento: "Evento", grupo: "Entradas", platillo: "Pico de Gallo", precioVenta: 100 },
            { tipoEvento: "Evento", grupo: "Platos Fuertes", platillo: "Cochinita Pibil", precioVenta: 180 },
            { tipoEvento: "Evento", grupo: "Platos Fuertes", platillo: "Barbacoa", precioVenta: 200 },
            { tipoEvento: "Evento / Catering", grupo: "Bebidas", platillo: "Agua Fresca (1L)", precioVenta: 40 },
            { tipoEvento: "Evento / Catering", grupo: "Bebidas", platillo: "Refresco", precioVenta: 30 },
            { tipoEvento: "Evento / Catering", grupo: "Postres", platillo: "Flan Napolitano", precioVenta: 60 },
            { tipoEvento: "Evento / Catering", grupo: "Postres", platillo: "Pastel Tres Leches", precioVenta: 80 }
        ];

        const SERVICE_BLOCKS = [
            { hours: 3, label: "3 Horas" },
            { hours: 4, label: "4 Horas" },
            { hours: 5, label: "5 Horas" },
            { hours: 6, label: "6 Horas" }
        ];

        // =========================
        // UTILIDADES
        // =========================

        function toNumberSafe(v) {
            const n = Number(v);
            return Number.isFinite(n) ? n : 0;
        }

        function normalizeMoneyInput(v) {
            return String(v || "").replace(/[^\d.]/g, "");
        }

        function formatMXN(n) {
            return toNumberSafe(n).toLocaleString("es-MX", { 
                style: "currency", 
                currency: "MXN" 
            });
        }

        function formatDateISO(d) {
            if (!d) return "";
            const [year, month, day] = d.split('-');
            return `${day}/${month}/${year}`;
        }

        function addHoursToTime(time, hours) {
            if (!time || !Number.isFinite(hours) || hours <= 0) return "";
            const [h, m] = time.split(":").map(Number);
            if (!Number.isFinite(h) || !Number.isFinite(m)) return "";
            const date = new Date();
            date.setHours(h, m, 0, 0);
            date.setHours(date.getHours() + hours);
            return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
        }

        // =========================
        // COMPONENTES UI
        // =========================

        function Badge({ children, tone = "neutral" }) {
            const tones = {
                neutral: { bg: COLORS.border, fg: COLORS.text },
                success: { bg: COLORS.success, fg: "#fff" },
                warning: { bg: COLORS.warning, fg: "#fff" },
                error: { bg: COLORS.error, fg: "#fff" },
                primary: { bg: COLORS.primary, fg: "#fff" }
            };
            const t = tones[tone] || tones.neutral;
            
            return (
                <span style={{
                    display: "inline-block",
                    padding: "4px 12px",
                    borderRadius: "999px",
                    background: t.bg,
                    color: t.fg,
                    fontSize: "0.75rem",
                    fontWeight: 700,
                    letterSpacing: "0.5px"
                }}>
                    {children}
                </span>
            );
        }

        function Section({ title, children, right, tone = "default" }) {
            const borderColors = {
                default: COLORS.border,
                primary: COLORS.primary,
                success: COLORS.success,
                warning: COLORS.warning,
                error: COLORS.error
            };

            return (
                <div style={{
                    background: COLORS.surface,
                    border: `2px solid ${borderColors[tone] || borderColors.default}`,
                    borderRadius: "var(--tdm-radius-lg)",
                    padding: "1.5rem",
                    boxShadow: "var(--tdm-shadow-sm)"
                }}>
                    <div style={{
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                        gap: "1rem",
                        marginBottom: "1rem",
                        paddingBottom: "0.75rem",
                        borderBottom: `1px solid ${COLORS.border}`
                    }}>
                        <h2 style={{
                            color: COLORS.text,
                            fontWeight: 700,
                            fontSize: "1.125rem",
                            margin: 0
                        }}>
                            {title}
                        </h2>
                        {right && <div>{right}</div>}
                    </div>
                    {children}
                </div>
            );
        }

        function Field({ label, children, hint, required, error }) {
            return (
                <div style={{ display: "grid", gap: "0.5rem" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                        <label style={{
                            fontWeight: 600,
                            color: COLORS.text,
                            fontSize: "0.875rem"
                        }}>
                            {label}
                        </label>
                        {required && <Badge tone="warning">Requerido</Badge>}
                    </div>
                    {hint && (
                        <div style={{
                            fontSize: "0.75rem",
                            color: COLORS.muted,
                            fontStyle: "italic"
                        }}>
                            💡 {hint}
                        </div>
                    )}
                    {children}
                    {error && (
                        <div style={{
                            fontSize: "0.75rem",
                            color: COLORS.error,
                            fontWeight: 500
                        }} role="alert">
                            ⚠️ {error}
                        </div>
                    )}
                </div>
            );
        }

        function Input({ value, onChange, placeholder, type = "text", disabled = false }) {
            return (
                <input
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                    placeholder={placeholder}
                    type={type}
                    disabled={disabled}
                    style={{
                        width: "100%",
                        padding: "0.75rem",
                        borderRadius: "var(--tdm-radius-md)",
                        border: `1px solid ${COLORS.border}`,
                        outline: "none",
                        background: disabled ? COLORS.background : COLORS.surface,
                        color: COLORS.text,
                        fontSize: "0.875rem",
                        fontWeight: 500,
                        transition: "border-color 0.2s ease"
                    }}
                    onFocus={(e) => e.target.style.borderColor = COLORS.accent}
                    onBlur={(e) => e.target.style.borderColor = COLORS.border}
                />
            );
        }

        function Select({ value, onChange, options, placeholder = "Selecciona..." }) {
            return (
                <select
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                    style={{
                        width: "100%",
                        padding: "0.75rem",
                        borderRadius: "var(--tdm-radius-md)",
                        border: `1px solid ${COLORS.border}`,
                        outline: "none",
                        background: COLORS.surface,
                        color: COLORS.text,
                        fontSize: "0.875rem",
                        fontWeight: 600,
                        cursor: "pointer"
                    }}
                >
                    <option value="">{placeholder}</option>
                    {options.map((o, i) => (
                        <option key={i} value={o.value ?? o}>
                            {o.label ?? o}
                        </option>
                    ))}
                </select>
            );
        }

        function Toggle({ value, onChange, left = "No", right = "Sí" }) {
            return (
                <div style={{ display: "flex", gap: "0.5rem" }}>
                    <button
                        onClick={() => onChange(false)}
                        style={{
                            flex: 1,
                            padding: "0.75rem",
                            borderRadius: "var(--tdm-radius-md)",
                            border: `2px solid ${value === false ? COLORS.primary : COLORS.border}`,
                            background: value === false ? COLORS.primary : COLORS.surface,
                            color: value === false ? "#fff" : COLORS.text,
                            fontWeight: 700,
                            cursor: "pointer",
                            transition: "all 0.2s ease"
                        }}
                    >
                        {left}
                    </button>
                    <button
                        onClick={() => onChange(true)}
                        style={{
                            flex: 1,
                            padding: "0.75rem",
                            borderRadius: "var(--tdm-radius-md)",
                            border: `2px solid ${value === true ? COLORS.primary : COLORS.border}`,
                            background: value === true ? COLORS.primary : COLORS.surface,
                            color: value === true ? "#fff" : COLORS.text,
                            fontWeight: 700,
                            cursor: "pointer",
                            transition: "all 0.2s ease"
                        }}
                    >
                        {right}
                    </button>
                </div>
            );
        }

        function Button({ children, onClick, disabled = false, variant = "primary", fullWidth = false }) {
            const variants = {
                primary: {
                    bg: COLORS.primary,
                    color: "#fff",
                    bgHover: COLORS.secondary
                },
                secondary: {
                    bg: COLORS.surface,
                    color: COLORS.primary,
                    bgHover: COLORS.background
                },
                success: {
                    bg: COLORS.success,
                    color: "#fff",
                    bgHover: "#43A047"
                },
                danger: {
                    bg: COLORS.error,
                    color: "#fff",
                    bgHover: "#E53935"
                }
            };

            const v = variants[variant] || variants.primary;

            return (
                <button
                    onClick={onClick}
                    disabled={disabled}
                    style={{
                        width: fullWidth ? "100%" : "auto",
                        padding: "0.875rem 1.5rem",
                        borderRadius: "var(--tdm-radius-md)",
                        border: "none",
                        background: disabled ? COLORS.border : v.bg,
                        color: disabled ? COLORS.muted : v.color,
                        fontSize: "0.875rem",
                        fontWeight: 700,
                        cursor: disabled ? "not-allowed" : "pointer",
                        transition: "all 0.2s ease",
                        boxShadow: disabled ? "none" : "var(--tdm-shadow-sm)"
                    }}
                    onMouseEnter={(e) => {
                        if (!disabled) e.target.style.background = v.bgHover;
                    }}
                    onMouseLeave={(e) => {
                        if (!disabled) e.target.style.background = v.bg;
                    }}
                >
                    {children}
                </button>
            );
        }

        function Alert({ children, tone = "info", onClose }) {
            const tones = {
                info: { bg: "#E3F2FD", border: "#2196F3", icon: "ℹ️" },
                success: { bg: "#E8F5E9", border: COLORS.success, icon: "✅" },
                warning: { bg: "#FFF3E0", border: COLORS.warning, icon: "⚠️" },
                error: { bg: "#FFEBEE", border: COLORS.error, icon: "❌" }
            };

            const t = tones[tone] || tones.info;

            return (
                <div style={{
                    padding: "1rem",
                    borderRadius: "var(--tdm-radius-md)",
                    background: t.bg,
                    border: `2px solid ${t.border}`,
                    display: "flex",
                    alignItems: "flex-start",
                    gap: "0.75rem",
                    fontSize: "0.875rem",
                    lineHeight: 1.5
                }}>
                    <span style={{ fontSize: "1.25rem" }}>{t.icon}</span>
                    <div style={{ flex: 1 }}>{children}</div>
                    {onClose && (
                        <button
                            onClick={onClose}
                            style={{
                                background: "none",
                                border: "none",
                                cursor: "pointer",
                                fontSize: "1.25rem",
                                color: COLORS.muted,
                                padding: 0
                            }}
                        >
                            ×
                        </button>
                    )}
                </div>
            );
        }

        // =========================
        // LÓGICA DE EXPORTACIÓN PDF
        // =========================

        function exportToPDF({
            clientName,
            phone,
            email,
            address,
            eventDate,
            totalPeople,
            hasKids,
            kidsCount,
            setupTime,
            serviceStart,
            serviceHours,
            serviceEnd,
            lines,
            subtotal,
            total,
            pricePerPerson,
            eventType
        }) {
            const doc = new jsPDF("p", "pt", "letter");
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const marginX = 40;
            const marginY = 50;
            let y = marginY;

            // Helper: Header (para todas las páginas)
            const drawHeader = () => {
                y = marginY;
                
                // Intentar dibujar logo (con fallback)
                try {
                    const logoImg = new Image();
                    logoImg.src = CONFIG.logoUrl;
                    doc.addImage(logoImg, "PNG", marginX, y, 80, 30);
                } catch (e) {
                    // Fallback tipográfico
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(12);
                    doc.setTextColor(COLORS.text);
                    doc.text("TACOS DON MANOLITO", marginX, y + 15);
                    doc.setFontSize(9);
                    doc.text(CONFIG.branchName, marginX, y + 28);
                }

                // Título + Folio
                doc.setFont("helvetica", "bold");
                doc.setFontSize(18);
                doc.setTextColor(COLORS.primary);
                const title = "COTIZACIÓN";
                const titleWidth = doc.getTextWidth(title);
                doc.text(title, pageWidth - marginX - titleWidth, y + 15);

                doc.setFont("helvetica", "normal");
                doc.setFontSize(9);
                doc.setTextColor(COLORS.muted);
                const folio = `Folio: COT-${Date.now()}`;
                const folioWidth = doc.getTextWidth(folio);
                doc.text(folio, pageWidth - marginX - folioWidth, y + 30);

                const fecha = `Fecha: ${new Date().toLocaleDateString("es-MX")}`;
                const fechaWidth = doc.getTextWidth(fecha);
                doc.text(fecha, pageWidth - marginX - fechaWidth, y + 42);

                y += 60;

                // Línea separadora
                doc.setDrawColor(COLORS.border);
                doc.setLineWidth(1);
                doc.line(marginX, y, pageWidth - marginX, y);
                y += 20;
            };

            // Helper: Footer (para todas las páginas)
            const drawFooter = (currentPage, totalPages) => {
                const footerY = pageHeight - 60;

                // Información de contacto
                doc.setFont("helvetica", "normal");
                doc.setFontSize(8);
                doc.setTextColor(COLORS.muted);
                
                const contactLine1 = `📞 ${CONFIG.contact.phone} | ✉️ ${CONFIG.contact.email}`;
                const contactLine2 = CONFIG.contact.address;
                const contactWidth1 = doc.getTextWidth(contactLine1);
                const contactWidth2 = doc.getTextWidth(contactLine2);
                
                doc.text(contactLine1, (pageWidth - contactWidth1) / 2, footerY);
                doc.text(contactLine2, (pageWidth - contactWidth2) / 2, footerY + 12);

                // Términos
                if (CONFIG.pdfTerms) {
                    doc.setFontSize(7);
                    doc.setTextColor(COLORS.muted);
                    const termsWidth = doc.getTextWidth(CONFIG.pdfTerms);
                    doc.text(CONFIG.pdfTerms, (pageWidth - termsWidth) / 2, footerY + 26);
                }

                // Página X de Y
                const pageText = `Página ${currentPage} de ${totalPages}`;
                const pageTextWidth = doc.getTextWidth(pageText);
                doc.setFont("helvetica", "bold");
                doc.setFontSize(8);
                doc.setTextColor(COLORS.text);
                doc.text(pageText, (pageWidth - pageTextWidth) / 2, footerY + 40);

                // Línea superior del footer
                doc.setDrawColor(COLORS.border);
                doc.setLineWidth(0.5);
                doc.line(marginX, footerY - 10, pageWidth - marginX, footerY - 10);
            };

            // PÁGINA 1: Header + Datos
            drawHeader();

            // Sección: Datos del Evento/Cliente
            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            doc.setTextColor(COLORS.text);
            doc.text("INFORMACIÓN DEL EVENTO", marginX, y);
            y += 18;

            // Tabla de datos (2 columnas)
            const infoData = [
                ["Tipo de Evento", eventType],
                ["Cliente", clientName || "No especificado"],
                ["Teléfono", phone],
                ["Correo", email || "No especificado"],
                ["Dirección del Evento", address],
                ["Fecha del Evento", formatDateISO(eventDate)],
                ["Total de Personas", String(totalPeople)],
                ["Incluye Niños", hasKids ? `Sí (${kidsCount})` : "No"],
                ["Horario de Montaje", setupTime],
                ["Horario de Servicio", `${serviceStart} - ${serviceEnd} (${serviceHours}h)`]
            ];

            doc.autoTable({
                startY: y,
                head: [["Campo", "Información"]],
                body: infoData,
                theme: "striped",
                headStyles: {
                    fillColor: COLORS.primary,
                    textColor: "#FFFFFF",
                    fontStyle: "bold",
                    fontSize: 10
                },
                bodyStyles: {
                    fontSize: 9,
                    cellPadding: 6
                },
                columnStyles: {
                    0: { cellWidth: 150, fontStyle: "bold" },
                    1: { cellWidth: pageWidth - marginX * 2 - 150 }
                },
                margin: { left: marginX, right: marginX }
            });

            y = doc.lastAutoTable.finalY + 24;

            // Sección: Productos
            if (y > pageHeight - 200) {
                doc.addPage();
                drawHeader();
            }

            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            doc.setTextColor(COLORS.text);
            doc.text("DETALLE DE PRODUCTOS", marginX, y);
            y += 18;

            if (lines.length === 0) {
                doc.setFont("helvetica", "italic");
                doc.setFontSize(10);
                doc.setTextColor(COLORS.muted);
                doc.text("No se agregaron productos.", marginX, y);
                y += 20;
            } else {
                const productData = lines.map(line => [
                    line.grupo,
                    line.platillo,
                    String(line.qty),
                    formatMXN(line.precioUnit),
                    formatMXN(line.total)
                ]);

                doc.autoTable({
                    startY: y,
                    head: [["Grupo", "Platillo", "Cant.", "P. Unitario", "Total"]],
                    body: productData,
                    theme: "striped",
                    headStyles: {
                        fillColor: COLORS.primary,
                        textColor: "#FFFFFF",
                        fontStyle: "bold",
                        fontSize: 10
                    },
                    bodyStyles: {
                        fontSize: 9,
                        cellPadding: 5
                    },
                    columnStyles: {
                        0: { cellWidth: 80 },
                        1: { cellWidth: 200 },
                        2: { cellWidth: 50, halign: "right" },
                        3: { cellWidth: 80, halign: "right" },
                        4: { cellWidth: 80, halign: "right", fontStyle: "bold" }
                    },
                    margin: { left: marginX, right: marginX },
                    didDrawPage: (data) => {
                        // Si hay salto de página en productos, dibujar header
                        if (data.pageNumber > 1) {
                            drawHeader();
                        }
                    }
                });

                y = doc.lastAutoTable.finalY + 24;
            }

            // Sección: Totales
            if (y > pageHeight - 180) {
                doc.addPage();
                drawHeader();
            }

            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            doc.setTextColor(COLORS.text);
            doc.text("RESUMEN", marginX, y);
            y += 18;

            const totalsData = [
                ["Subtotal", formatMXN(subtotal)],
                ["TOTAL", formatMXN(total)],
                ["Precio por Persona", formatMXN(pricePerPerson)]
            ];

            doc.autoTable({
                startY: y,
                body: totalsData,
                theme: "plain",
                bodyStyles: {
                    fontSize: 11,
                    cellPadding: 8
                },
                columnStyles: {
                    0: { 
                        cellWidth: 200, 
                        fontStyle: "bold",
                        textColor: COLORS.text
                    },
                    1: { 
                        cellWidth: pageWidth - marginX * 2 - 200, 
                        halign: "right",
                        fontStyle: "bold",
                        fontSize: 12,
                        textColor: COLORS.primary
                    }
                },
                margin: { left: marginX, right: marginX },
                didParseCell: (data) => {
                    // Destacar TOTAL
                    if (data.row.index === 1) {
                        data.cell.styles.fillColor = [241, 240, 238];
                        data.cell.styles.fontSize = 14;
                    }
                }
            });

            // Footer en todas las páginas
            const totalPagesExp = "{total_pages_count_string}";
            const pageCount = doc.internal.getNumberOfPages();
            
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                drawFooter(i, pageCount);
            }

            // Guardar PDF
            const fileName = `Cotizacion_TDM_${clientName.replace(/\s+/g, "_")}_${Date.now()}.pdf`;
            doc.save(fileName);
        }

        // =========================
        // COMPONENTE PRINCIPAL
        // =========================

        function App() {
            // Estado: Gates
            const [gateHasOrdered, setGateHasOrdered] = useState("");
            const [gateEventType, setGateEventType] = useState("");

            // Estado: Cliente pre-cargado
            const [clientPick, setClientPick] = useState("");

            // Estado: Formulario maestro
            const [eventDate, setEventDate] = useState("");
            const [peopleTotal, setPeopleTotal] = useState("");
            const [hasKids, setHasKids] = useState(false);
            const [kidsCount, setKidsCount] = useState("");
            const [setupTime, setSetupTime] = useState("");
            const [serviceStart, setServiceStart] = useState("");
            const [serviceBlock, setServiceBlock] = useState("");
            const [clientName, setClientName] = useState("");
            const [phone, setPhone] = useState("");
            const [email, setEmail] = useState("");
            const [address, setAddress] = useState("");
            const [mapsUrl, setMapsUrl] = useState("");

            // Estado: Productos
            const [prodGroup, setProdGroup] = useState("");
            const [prodPick, setProdPick] = useState("");
            const [prodQty, setProdQty] = useState("");
            const [lines, setLines] = useState([]);
            const [sortMode, setSortMode] = useState("az");

            // Estado: Alertas
            const [showAlerts, setShowAlerts] = useState(true);

            // Cliente seleccionado
            const selectedClient = useMemo(() => {
                const idx = parseInt(clientPick, 10);
                if (!Number.isFinite(idx) || idx < 0) return null;
                return DATA_CLIENTS[idx] ?? null;
            }, [clientPick]);

            // Auto-llenar datos si es cliente existente
            useEffect(() => {
                if (gateHasOrdered !== "Sí") return;
                if (selectedClient) {
                    setClientName(selectedClient.cliente ?? "");
                    setPhone(selectedClient.telefono ?? "");
                    setEmail(selectedClient.correo ?? "");
                    setAddress(selectedClient.direccion ?? "");
                }
            }, [gateHasOrdered, selectedClient]);

            // Gates listos
            const gatesReady = useMemo(() => 
                gateHasOrdered && gateEventType, 
                [gateHasOrdered, gateEventType]
            );

            // Productos habilitados según tipo de evento
            const enabledProducts = useMemo(() => {
                const t = gateEventType;
                if (!t) return [];
                
                return DATA_PRODUCTS.filter((p) => {
                    if (!p?.tipoEvento) return false;
                    if (t === "Catering") {
                        return p.tipoEvento === "Catering" || p.tipoEvento === "Evento / Catering";
                    }
                    if (t === "Evento") {
                        return p.tipoEvento === "Evento" || p.tipoEvento === "Evento / Catering";
                    }
                    return false;
                });
            }, [gateEventType]);

            // Grupos disponibles
            const groups = useMemo(() => {
                const s = new Set(enabledProducts.map(p => p.grupo).filter(Boolean));
                return Array.from(s).sort((a, b) => 
                    String(a).localeCompare(String(b), CONFIG.language)
                );
            }, [enabledProducts]);

            // Productos en grupo actual
            const productsInGroup = useMemo(() => {
                const arr = enabledProducts.filter(p => 
                    prodGroup ? p.grupo === prodGroup : true
                );
                return arr.sort((a, b) => 
                    String(a.platillo).localeCompare(String(b.platillo), CONFIG.language)
                );
            }, [enabledProducts, prodGroup]);

            // Producto seleccionado
            const pickedProduct = useMemo(() => {
                const idx = parseInt(prodPick, 10);
                if (!Number.isFinite(idx) || idx < 0) return null;
                return productsInGroup[idx] ?? null;
            }, [prodPick, productsInGroup]);

            // Cálculos
            const totalPeopleNum = useMemo(() => 
                toNumberSafe(normalizeMoneyInput(peopleTotal)), 
                [peopleTotal]
            );

            const kidsNum = useMemo(() => 
                hasKids ? toNumberSafe(normalizeMoneyInput(kidsCount)) : 0, 
                [hasKids, kidsCount]
            );

            const adultsNum = useMemo(() => 
                Math.max(0, totalPeopleNum - kidsNum), 
                [totalPeopleNum, kidsNum]
            );

            const subtotal = useMemo(() => 
                lines.reduce((acc, l) => acc + toNumberSafe(l.total), 0), 
                [lines]
            );

            const total = useMemo(() => subtotal, [subtotal]);

            const pricePerPerson = useMemo(() => 
                adultsNum > 0 ? total / adultsNum : 0, 
                [total, adultsNum]
            );

            const durationHours = useMemo(() => {
                const h = parseInt(serviceBlock, 10);
                return Number.isFinite(h) ? h : 0;
            }, [serviceBlock]);

            const serviceEnd = useMemo(() => 
                addHoursToTime(serviceStart, durationHours), 
                [serviceStart, durationHours]
            );

            // Validaciones y advertencias
            const warnings = useMemo(() => {
                const w = [];
                
                // Regla comercial
                if (gateEventType && totalPeopleNum) {
                    if (totalPeopleNum < 40 && gateEventType !== "Catering") {
                        w.push("Por regla comercial, < 40 personas sugiere Catering.");
                    }
                    if (totalPeopleNum >= 40 && gateEventType !== "Evento") {
                        w.push("Por regla comercial, ≥ 40 personas sugiere Evento.");
                    }
                }

                // Niños
                if (hasKids && kidsNum > totalPeopleNum) {
                    w.push("Número de niños no puede ser mayor al total de personas.");
                }

                // Adultos
                if (adultsNum <= 0 && totalPeopleNum > 0) {
                    w.push("Debe haber al menos 1 adulto.");
                }

                return w;
            }, [gateEventType, totalPeopleNum, hasKids, kidsNum, adultsNum]);

            // Campos faltantes para exportar
            const missingFields = useMemo(() => {
                const missing = [];
                
                if (!gatesReady) missing.push("Tipo de evento");
                if (!eventDate) missing.push("Fecha del evento");
                if (!peopleTotal || totalPeopleNum <= 0) missing.push("Número de personas");
                if (!setupTime) missing.push("Horario de montaje");
                if (!serviceStart) missing.push("Horario de servicio");
                if (!serviceBlock) missing.push("Duración de servicio");
                if (!phone) missing.push("Teléfono");
                if (!address) missing.push("Dirección del evento");
                if (!mapsUrl) missing.push("Liga de Google Maps");
                
                if (hasKids && (!kidsCount || kidsNum > totalPeopleNum)) {
                    missing.push("Número de niños válido");
                }
                
                if (adultsNum <= 0) {
                    missing.push("Al menos 1 adulto");
                }

                return missing;
            }, [
                gatesReady, eventDate, peopleTotal, totalPeopleNum, setupTime,
                serviceStart, serviceBlock, phone, address, mapsUrl,
                hasKids, kidsCount, kidsNum, adultsNum
            ]);

            const canExportPdf = useMemo(() => 
                missingFields.length === 0, 
                [missingFields]
            );

            // Handlers
            const addLine = useCallback(() => {
                if (!pickedProduct) return;
                const qty = toNumberSafe(normalizeMoneyInput(prodQty));
                if (qty <= 0) return;

                const precio = toNumberSafe(pickedProduct.precioVenta);
                const newLine = {
                    id: Date.now(),
                    tipoEvento: pickedProduct.tipoEvento,
                    grupo: pickedProduct.grupo,
                    platillo: pickedProduct.platillo,
                    precioUnit: precio,
                    qty,
                    total: precio * qty
                };

                setLines(prev => [...prev, newLine]);
                setProdPick("");
                setProdQty("");
            }, [pickedProduct, prodQty]);

            const removeLine = useCallback((id) => {
                setLines(prev => prev.filter(l => l.id !== id));
            }, []);

            const sortedLines = useMemo(() => {
                const arr = [...lines];
                
                if (sortMode === "az") {
                    arr.sort((a, b) => 
                        String(a.platillo).localeCompare(String(b.platillo), CONFIG.language)
                    );
                } else if (sortMode === "za") {
                    arr.sort((a, b) => 
                        String(b.platillo).localeCompare(String(a.platillo), CONFIG.language)
                    );
                } else if (sortMode === "min") {
                    arr.sort((a, b) => toNumberSafe(a.total) - toNumberSafe(b.total));
                } else if (sortMode === "max") {
                    arr.sort((a, b) => toNumberSafe(b.total) - toNumberSafe(a.total));
                }
                
                return arr;
            }, [lines, sortMode]);

            const handleExportPdf = useCallback(() => {
                if (!canExportPdf) return;

                exportToPDF({
                    clientName,
                    phone,
                    email,
                    address,
                    eventDate,
                    totalPeople: totalPeopleNum,
                    hasKids,
                    kidsCount: kidsNum,
                    setupTime,
                    serviceStart,
                    serviceHours: durationHours,
                    serviceEnd,
                    lines: sortedLines,
                    subtotal,
                    total,
                    pricePerPerson,
                    eventType: gateEventType
                });
            }, [
                canExportPdf, clientName, phone, email, address, eventDate,
                totalPeopleNum, hasKids, kidsNum, setupTime, serviceStart,
                durationHours, serviceEnd, sortedLines, subtotal, total,
                pricePerPerson, gateEventType
            ]);

            // Render
            return (
                <div style={{ 
                    minHeight: "100vh", 
                    background: COLORS.background,
                    paddingBottom: "2rem"
                }}>
                    {/* HEADER STICKY */}
                    <header style={{
                        position: "sticky",
                        top: 0,
                        zIndex: 100,
                        background: COLORS.primary,
                        color: "#fff",
                        boxShadow: "var(--tdm-shadow-lg)"
                    }}>
                        <div className="container" style={{
                            display: "flex",
                            alignItems: "center",
                            gap: "1rem",
                            padding: "1rem"
                        }}>
                            {/* Logo con fallback */}
                            <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                                <img 
                                    src={CONFIG.logoUrl} 
                                    alt="Tacos Don Manolito"
                                    style={{ 
                                        height: "50px", 
                                        width: "auto",
                                        filter: "brightness(0) invert(1)"
                                    }}
                                    onError={(e) => {
                                        e.target.style.display = "none";
                                        e.target.nextElementSibling.style.display = "block";
                                    }}
                                />
                                <div style={{ display: "none" }}>
                                    <div style={{ 
                                        fontWeight: 900, 
                                        fontSize: "1.25rem",
                                        letterSpacing: "0.5px"
                                    }}>
                                        TACOS DON MANOLITO
                                    </div>
                                    <div style={{ 
                                        fontSize: "0.875rem",
                                        opacity: 0.9
                                    }}>
                                        {CONFIG.branchName}
                                    </div>
                                </div>
                            </div>

                            <div style={{ flex: 1, marginLeft: "1rem" }}>
                                <h1 style={{
                                    fontSize: "1.25rem",
                                    fontWeight: 700,
                                    margin: 0,
                                    letterSpacing: "0.3px"
                                }}>
                                    {CONFIG.pageTitle}
                                </h1>
                                <p style={{
                                    fontSize: "0.875rem",
                                    opacity: 0.9,
                                    margin: 0
                                }}>
                                    Sistema de Cotización | {CONFIG.branchName}
                                </p>
                            </div>

                            <div style={{ 
                                display: "flex", 
                                gap: "0.75rem", 
                                alignItems: "center" 
                            }}>
                                {gatesReady ? (
                                    <Badge tone="success">✓ Inicio OK</Badge>
                                ) : (
                                    <Badge tone="error">Completa inicio</Badge>
                                )}
                                
                                <Button
                                    onClick={handleExportPdf}
                                    disabled={!canExportPdf}
                                    variant="success"
                                >
                                    📄 Exportar PDF
                                </Button>
                            </div>
                        </div>
                    </header>

                    <div className="container" style={{ marginTop: "1.5rem" }}>
                        {/* ALERTAS GLOBALES */}
                        {!canExportPdf && showAlerts && (
                            <Alert tone="warning" onClose={() => setShowAlerts(false)}>
                                <strong>Faltan campos requeridos para exportar:</strong>
                                <ul style={{ margin: "0.5rem 0 0 1.5rem", padding: 0 }}>
                                    {missingFields.map((field, i) => (
                                        <li key={i}>{field}</li>
                                    ))}
                                </ul>
                            </Alert>
                        )}

                        {warnings.length > 0 && showAlerts && (
                            <div style={{ marginTop: "1rem" }}>
                                <Alert tone="warning">
                                    <strong>Advertencias:</strong>
                                    <ul style={{ margin: "0.5rem 0 0 1.5rem", padding: 0 }}>
                                        {warnings.map((w, i) => (
                                            <li key={i}>{w}</li>
                                        ))}
                                    </ul>
                                </Alert>
                            </div>
                        )}

                        {/* LAYOUT PRINCIPAL: 2 COLUMNAS DESKTOP / 1 MÓVIL */}
                        <div style={{
                            display: "grid",
                            gridTemplateColumns: "minmax(0, 1.8fr) minmax(0, 1fr)",
                            gap: "1.5rem",
                            marginTop: "1.5rem"
                        }}>
                            {/* COLUMNA IZQUIERDA: FORMULARIO */}
                            <div style={{ display: "grid", gap: "1.5rem", alignContent: "start" }}>
                                
                                {/* SECCIÓN 1: GATES */}
                                <Section 
                                    title="1. Inicio" 
                                    right={gatesReady ? <Badge tone="success">Completo</Badge> : <Badge tone="error">Pendiente</Badge>}
                                    tone={gatesReady ? "success" : "error"}
                                >
                                    <div style={{
                                        display: "grid",
                                        gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))",
                                        gap: "1rem"
                                    }}>
                                        <Field 
                                            label="¿Ya ha pedido con nosotros?" 
                                            required
                                        >
                                            <Select
                                                value={gateHasOrdered}
                                                onChange={(v) => {
                                                    setGateHasOrdered(v);
                                                    if (v !== "Sí") setClientPick("");
                                                }}
                                                options={["Sí", "No"]}
                                            />
                                        </Field>

                                        {gateHasOrdered === "Sí" && (
                                            <Field label="Seleccionar cliente">
                                                <Select
                                                    value={clientPick}
                                                    onChange={setClientPick}
                                                    options={DATA_CLIENTS.map((c, i) => ({
                                                        value: String(i),
                                                        label: c.cliente
                                                    }))}
                                                    placeholder="Buscar cliente..."
                                                />
                                            </Field>
                                        )}

                                        <Field 
                                            label="¿Es un Catering o un Evento?" 
                                            required
                                            hint="Catering: < 40 | Evento: ≥ 40 personas"
                                        >
                                            <Select
                                                value={gateEventType}
                                                onChange={setGateEventType}
                                                options={["Catering", "Evento"]}
                                            />
                                        </Field>
                                    </div>
                                </Section>

                                {/* SECCIÓN 2: DATOS DEL EVENTO */}
                                <Section 
                                    title="2. Datos del Evento"
                                    tone={gatesReady ? "default" : "default"}
                                >
                                    {!gatesReady ? (
                                        <Alert tone="info">
                                            Completa la sección de <strong>Inicio</strong> para continuar.
                                        </Alert>
                                    ) : (
                                        <div style={{ display: "grid", gap: "1rem" }}>
                                            {/* Información del cliente */}
                                            <div style={{
                                                display: "grid",
                                                gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))",
                                                gap: "1rem"
                                            }}>
                                                <Field label="Nombre del cliente">
                                                    <Input
                                                        value={clientName}
                                                        onChange={setClientName}
                                                        placeholder="Ej. Juan Pérez"
                                                    />
                                                </Field>

                                                <Field label="Teléfono" required>
                                                    <Input
                                                        value={phone}
                                                        onChange={setPhone}
                                                        type="tel"
                                                        placeholder="Ej. 5645960445"
                                                    />
                                                </Field>

                                                <Field label="Correo electrónico">
                                                    <Input
                                                        value={email}
                                                        onChange={setEmail}
                                                        type="email"
                                                        placeholder="Ej. cliente@correo.com"
                                                    />
                                                </Field>
                                            </div>

                                            {/* Dirección y mapa */}
                                            <Field label="Dirección del evento" required>
                                                <Input
                                                    value={address}
                                                    onChange={setAddress}
                                                    placeholder="Calle, número, colonia, delegación, CDMX"
                                                />
                                            </Field>

                                            <Field label="Liga de Google Maps" required>
                                                <Input
                                                    value={mapsUrl}
                                                    onChange={setMapsUrl}
                                                    type="url"
                                                    placeholder="https://maps.google.com/..."
                                                />
                                            </Field>

                                            {/* Fecha y personas */}
                                            <div style={{
                                                display: "grid",
                                                gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))",
                                                gap: "1rem"
                                            }}>
                                                <Field label="Fecha del evento" required>
                                                    <Input
                                                        value={eventDate}
                                                        onChange={setEventDate}
                                                        type="date"
                                                    />
                                                </Field>

                                                <Field 
                                                    label="Número de personas" 
                                                    required
                                                    hint="< 40 Catering | ≥ 40 Evento"
                                                >
                                                    <Input
                                                        value={peopleTotal}
                                                        onChange={setPeopleTotal}
                                                        type="number"
                                                        placeholder="Ej. 80"
                                                    />
                                                </Field>
                                            </div>

                                            {/* Niños */}
                                            <Field label="¿Incluye niños?">
                                                <Toggle
                                                    value={hasKids}
                                                    onChange={setHasKids}
                                                />
                                            </Field>

                                            {hasKids && (
                                                <Field 
                                                    label="Número de niños" 
                                                    required
                                                    error={kidsNum > totalPeopleNum ? "No puede ser mayor al total" : ""}
                                                >
                                                    <Input
                                                        value={kidsCount}
                                                        onChange={setKidsCount}
                                                        type="number"
                                                        placeholder="Ej. 15"
                                                    />
                                                </Field>
                                            )}

                                            {/* Horarios */}
                                            <div style={{
                                                display: "grid",
                                                gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))",
                                                gap: "1rem"
                                            }}>
                                                <Field label="Horario de montaje" required>
                                                    <Input
                                                        value={setupTime}
                                                        onChange={setSetupTime}
                                                        type="time"
                                                    />
                                                </Field>

                                                <Field label="Servicio (inicio)" required>
                                                    <Input
                                                        value={serviceStart}
                                                        onChange={setServiceStart}
                                                        type="time"
                                                    />
                                                </Field>

                                                <Field label="Duración" required>
                                                    <Select
                                                        value={serviceBlock}
                                                        onChange={setServiceBlock}
                                                        options={SERVICE_BLOCKS.map(x => ({
                                                            value: String(x.hours),
                                                            label: x.label
                                                        }))}
                                                    />
                                                </Field>
                                            </div>

                                            {serviceEnd && (
                                                <Alert tone="info">
                                                    <strong>Servicio finaliza:</strong> {serviceEnd}
                                                </Alert>
                                            )}
                                        </div>
                                    )}
                                </Section>

                                {/* SECCIÓN 3: PRODUCTOS */}
                                <Section title="3. Productos">
                                    {!gatesReady ? (
                                        <Alert tone="info">
                                            Completa la sección de <strong>Inicio</strong> para agregar productos.
                                        </Alert>
                                    ) : (
                                        <div style={{ display: "grid", gap: "1rem" }}>
                                            {/* Agregar productos */}
                                            <div style={{
                                                display: "grid",
                                                gridTemplateColumns: "1fr 1.5fr 0.8fr auto",
                                                gap: "0.75rem",
                                                alignItems: "end"
                                            }}>
                                                <Field label="Grupo">
                                                    <Select
                                                        value={prodGroup}
                                                        onChange={(v) => {
                                                            setProdGroup(v);
                                                            setProdPick("");
                                                        }}
                                                        options={groups}
                                                        placeholder="Todos"
                                                    />
                                                </Field>

                                                <Field label="Platillo">
                                                    <Select
                                                        value={prodPick}
                                                        onChange={setProdPick}
                                                        options={productsInGroup.map((p, i) => ({
                                                            value: String(i),
                                                            label: `${p.platillo} (${formatMXN(p.precioVenta)})`
                                                        }))}
                                                        placeholder="Selecciona..."
                                                    />
                                                </Field>

                                                <Field label="Cantidad">
                                                    <Input
                                                        value={prodQty}
                                                        onChange={setProdQty}
                                                        type="number"
                                                        placeholder="Ej. 10"
                                                    />
                                                </Field>

                                                <Button
                                                    onClick={addLine}
                                                    disabled={!pickedProduct || !prodQty}
                                                    variant="primary"
                                                >
                                                    ➕ Agregar
                                                </Button>
                                            </div>

                                            {/* Tabla de productos */}
                                            {sortedLines.length === 0 ? (
                                                <Alert tone="info">
                                                    <strong>Estado vacío:</strong> Agrega productos para comenzar.
                                                </Alert>
                                            ) : (
                                                <>
                                                    {/* Ordenamiento */}
                                                    <div style={{ 
                                                        display: "flex", 
                                                        gap: "0.5rem",
                                                        alignItems: "center",
                                                        flexWrap: "wrap"
                                                    }}>
                                                        <span style={{ 
                                                            fontSize: "0.875rem", 
                                                            fontWeight: 600,
                                                            color: COLORS.muted
                                                        }}>
                                                            Ordenar:
                                                        </span>
                                                        <Button
                                                            onClick={() => setSortMode("az")}
                                                            variant={sortMode === "az" ? "primary" : "secondary"}
                                                        >
                                                            A-Z
                                                        </Button>
                                                        <Button
                                                            onClick={() => setSortMode("za")}
                                                            variant={sortMode === "za" ? "primary" : "secondary"}
                                                        >
                                                            Z-A
                                                        </Button>
                                                        <Button
                                                            onClick={() => setSortMode("min")}
                                                            variant={sortMode === "min" ? "primary" : "secondary"}
                                                        >
                                                            Menor
                                                        </Button>
                                                        <Button
                                                            onClick={() => setSortMode("max")}
                                                            variant={sortMode === "max" ? "primary" : "secondary"}
                                                        >
                                                            Mayor
                                                        </Button>
                                                    </div>

                                                    {/* Tabla */}
                                                    <div style={{ overflowX: "auto" }}>
                                                        <table style={{
                                                            width: "100%",
                                                            borderCollapse: "collapse",
                                                            fontSize: "0.875rem"
                                                        }}>
                                                            <thead>
                                                                <tr style={{
                                                                    background: COLORS.primary,
                                                                    color: "#fff"
                                                                }}>
                                                                    <th style={{
                                                                        textAlign: "left",
                                                                        padding: "0.75rem"
                                                                    }}>
                                                                        Platillo
                                                                    </th>
                                                                    <th style={{
                                                                        textAlign: "right",
                                                                        padding: "0.75rem"
                                                                    }}>
                                                                        Cantidad
                                                                    </th>
                                                                    <th style={{
                                                                        textAlign: "right",
                                                                        padding: "0.75rem"
                                                                    }}>
                                                                        P. Unitario
                                                                    </th>
                                                                    <th style={{
                                                                        textAlign: "right",
                                                                        padding: "0.75rem"
                                                                    }}>
                                                                        Total
                                                                    </th>
                                                                    <th style={{
                                                                        textAlign: "center",
                                                                        padding: "0.75rem"
                                                                    }}>
                                                                        Acción
                                                                    </th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {sortedLines.map((line, idx) => (
                                                                    <tr
                                                                        key={line.id}
                                                                        style={{
                                                                            borderBottom: `1px solid ${COLORS.border}`,
                                                                            background: idx % 2 === 0 ? COLORS.surface : COLORS.background
                                                                        }}
                                                                    >
                                                                        <td style={{
                                                                            padding: "0.75rem",
                                                                            fontWeight: 600
                                                                        }}>
                                                                            {line.platillo}
                                                                        </td>
                                                                        <td style={{
                                                                            padding: "0.75rem",
                                                                            textAlign: "right"
                                                                        }}>
                                                                            {line.qty}
                                                                        </td>
                                                                        <td style={{
                                                                            padding: "0.75rem",
                                                                            textAlign: "right"
                                                                        }}>
                                                                            {formatMXN(line.precioUnit)}
                                                                        </td>
                                                                        <td style={{
                                                                            padding: "0.75rem",
                                                                            textAlign: "right",
                                                                            fontWeight: 700,
                                                                            color: COLORS.primary
                                                                        }}>
                                                                            {formatMXN(line.total)}
                                                                        </td>
                                                                        <td style={{
                                                                            padding: "0.75rem",
                                                                            textAlign: "center"
                                                                        }}>
                                                                            <Button
                                                                                onClick={() => removeLine(line.id)}
                                                                                variant="danger"
                                                                            >
                                                                                ✕
                                                                            </Button>
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    )}
                                </Section>
                            </div>

                            {/* COLUMNA DERECHA: RESUMEN STICKY */}
                            <div style={{
                                position: "sticky",
                                top: "120px",
                                alignSelf: "start"
                            }}>
                                <Section 
                                    title="Resumen" 
                                    right={canExportPdf ? <Badge tone="success">Listo</Badge> : <Badge tone="warning">Revisar</Badge>}
                                    tone={canExportPdf ? "success" : "warning"}
                                >
                                    <div style={{
                                        display: "grid",
                                        gap: "1rem",
                                        fontSize: "0.875rem"
                                    }}>
                                        {/* Cliente */}
                                        <div>
                                            <div style={{ 
                                                fontWeight: 700, 
                                                fontSize: "1rem",
                                                marginBottom: "0.25rem"
                                            }}>
                                                {clientName || "Cliente sin nombre"}
                                            </div>
                                            <div style={{ color: COLORS.muted }}>
                                                {phone || "Sin teléfono"}
                                            </div>
                                            <div style={{ 
                                                color: COLORS.muted,
                                                fontSize: "0.75rem",
                                                marginTop: "0.25rem"
                                            }}>
                                                {address || "Sin dirección"}
                                            </div>
                                        </div>

                                        <div style={{
                                            borderTop: `1px solid ${COLORS.border}`,
                                            paddingTop: "1rem"
                                        }}>
                                            {/* Personas */}
                                            {totalPeopleNum > 0 && (
                                                <div style={{
                                                    display: "flex",
                                                    justifyContent: "space-between",
                                                    marginBottom: "0.5rem"
                                                }}>
                                                    <span style={{ fontWeight: 600 }}>
                                                        Personas:
                                                    </span>
                                                    <span>
                                                        {totalPeopleNum} total 
                                                        {hasKids && ` (${adultsNum} adultos, ${kidsNum} niños)`}
                                                    </span>
                                                </div>
                                            )}

                                            {/* Fecha */}
                                            {eventDate && (
                                                <div style={{
                                                    display: "flex",
                                                    justifyContent: "space-between",
                                                    marginBottom: "0.5rem"
                                                }}>
                                                    <span style={{ fontWeight: 600 }}>
                                                        Fecha:
                                                    </span>
                                                    <span>{formatDateISO(eventDate)}</span>
